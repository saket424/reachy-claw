# reachy-claw configuration
# Remote speech service on Jetson (Paraformer streaming ASR + Matcha TTS)

stt:
  backend: paraformer-streaming
  speech_service_url: http://100.67.111.58:8000
  sensevoice_language: auto

tts:
  backend: matcha
  speech_service_url: http://100.67.111.58:8000
  matcha:
    speaker_id: 0
    speed: 1.2
  kokoro:
    speaker_id: 3
    speed: 1.2

vad:
  backend: silero  # "silero" (onnxruntime, CPU) or "energy" (simple threshold)

llm:
  backend: ollama  # "ollama" (local) or "gateway" (OpenClaw)
  model: qwen3.5:0.8b
  base_url: http://localhost:11434
  # system_prompt: "custom prompt here"  # optional
  # temperature: 0.7
  # max_history: 0  # conversation turns to keep (0 = stateless)

reachy:
  serialport: /dev/cu.wchusbserial5B420748751
  spawn_daemon: false


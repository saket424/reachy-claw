# Unified Reachy Claw stack for Jetson.
#
# LLM modes (pick one):
#   Ollama mode (default):  docker compose --profile ollama up -d
#   OpenClaw mode:          docker compose --profile openclaw up -d
#   + vision:               add --profile vision
#
# Both modes share: reachy-daemon, reachy-claw, speech (external).
# Ollama profile adds: ollama container.
# OpenClaw profile adds: openclaw-gateway.

services:
  # ── Always-on services ────────────────────────────────────────────

  reachy-daemon:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-daemon:v1.0
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    command: >-
      reachy-mini-daemon
      --serialport ${SERIAL_PORT:-auto}
      --localhost-only
      --deactivate-audio
      --fastapi-port 38001
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reachy-claw:
    image: reachy-claw:v1.9
    container_name: reachy-claw
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ./reachy-claw.jetson.yaml:/app/reachy-claw.yaml:ro
      - /run/udev:/run/udev:ro
      - /dev/shm:/dev/shm
    depends_on:
      reachy-daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8640/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vision TRT (opt-in) ──────────────────────────────────────────

  vision-trt:
    profiles: ["vision"]
    build: ../vision-trt
    container_name: vision-trt
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    volumes:
      - /dev/shm:/dev/shm
      - ../vision-trt/models:/app/models:ro
      - vision-trt-engines:/app/engines
      - vision-trt-data:/app/data
      # Mount host TensorRT (JetPack 6.x)
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3.10/dist-packages/tensorrt:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
    environment:
      - LD_LIBRARY_PATH=/host-libs:/usr/local/cuda/lib64
      - SHM_FRAME_PATH=/dev/shm/vision_frame
      - ZMQ_PUB_PORT=8631
      - HTTP_PORT=8630
      - STREAM_PORT=8632
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8630/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      reachy-claw:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama profile (opt-in) ──────────────────────────────────────

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── OpenClaw profile (opt-in) ────────────────────────────────────

  openclaw-gateway:
    profiles: ["openclaw"]
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - openclaw-config:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway", "--bind", "lan", "--allow-unconfigured"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama-data:
  openclaw-config:
  vision-trt-engines:
  vision-trt-data:

<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Light rays — white rounded lines -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <line x1="60" y1="5" x2="60" y2="15"/>
    <line x1="28" y1="15" x2="35" y2="23"/>
    <line x1="92" y1="15" x2="85" y2="23"/>
    <line x1="14" y1="38" x2="24" y2="42"/>
    <line x1="106" y1="38" x2="96" y2="42"/>
  </g>

  <!-- Brain shape — golden/tan fill with darker outline -->
  <g fill="#d4a856" stroke="#c49a3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- Left hemisphere -->
    <path d="M 60 28 C 55 24 42 20 34 28 C 26 36 26 44 30 52 C 28 50 22 42 24 32 C 26 22 38 18 48 22" fill="#d4a856"/>
    <path d="M 60 28 C 52 24 36 24 30 36 C 24 48 28 62 36 70 C 40 74 48 78 54 78 L 60 78 C 60 78 60 50 60 28"/>
    <!-- Right hemisphere -->
    <path d="M 60 28 C 68 24 84 24 90 36 C 96 48 92 62 84 70 C 80 74 72 78 66 78 L 60 78 C 60 78 60 50 60 28"/>
    <path d="M 60 28 C 65 24 78 20 86 28 C 94 36 94 44 90 52 C 92 50 98 42 96 32 C 94 22 82 18 72 22" fill="#d4a856"/>
  </g>

  <!-- Brain folds/grooves — darker golden lines -->
  <g fill="none" stroke="#a07830" stroke-width="2" stroke-linecap="round">
    <!-- Central groove -->
    <path d="M 60 30 C 58 42 62 58 60 76"/>
    <!-- Left folds -->
    <path d="M 42 36 C 38 42 40 50 48 48"/>
    <path d="M 36 52 C 40 58 50 56 52 62"/>
    <!-- Right folds -->
    <path d="M 78 36 C 82 42 80 50 72 48"/>
    <path d="M 84 52 C 80 58 70 56 68 62"/>
  </g>

  <!-- Lightbulb base — white/silver -->
  <g fill="none" stroke="#e8e8e8" stroke-width="3.5" stroke-linecap="round">
    <path d="M 48 82 C 48 80 52 78 60 78 C 68 78 72 80 72 82"/>
    <line x1="48" y1="88" x2="72" y2="88"/>
    <line x1="50" y1="94" x2="70" y2="94"/>
    <line x1="53" y1="100" x2="67" y2="100"/>
    <path d="M 56 100 C 56 105 64 105 64 100"/>
  </g>
  <!-- Bulb base fill for solidity -->
  <rect x="48" y="82" width="24" height="18" rx="2" fill="#e8e8e8" opacity="0.15"/>
</svg>
